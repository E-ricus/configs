# Stow Configuration
# Format: package -> target_directory
# Lines starting with # are comments

# XDG Config files
nvim -> ~/.config/nvim
helix -> ~/.config/helix
emacs -> ~/.emacs.d
bin -> ~/.local/bin

# Home directory files 
ideavim -> ~/

# QMK personal keymap (requires `qmk setup` first)
qmk/dactyl_manuform_6x6/ericus -> ~/qmk_firmware/keyboards/handwired/dactyl_manuform/6x6/keymaps/ericus
